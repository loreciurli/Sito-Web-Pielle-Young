/* ═════════════════════════════════════════════════════════════
   CINEMATIC LOADER — coerente con logo navbar (logo-pl-fish.png)
   Fade-out automatico al primo paint di React
   ═════════════════════════════════════════════════════════════ */
#py-loader{
  position:fixed; inset:0; z-index:9999;
  background:radial-gradient(ellipse at 50% 40%, #0a2960 0%, #03174A 45%, #02112F 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:28px;
  opacity:1; visibility:visible;
  transition:opacity .6s ease, visibility 0s linear .6s;
  padding-bottom:env(safe-area-inset-bottom);
}
#py-loader.is-hidden{ opacity:0; visibility:hidden; pointer-events:none }

/* Subtle grain / glow */
#py-loader::before{
  content:""; position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(circle at 30% 20%, rgba(246,190,61,.14), transparent 55%),
    radial-gradient(circle at 75% 80%, rgba(90,160,232,.18), transparent 55%);
}
#py-loader::after{
  content:""; position:absolute; inset:0; pointer-events:none; opacity:.08;
  background-image:
    radial-gradient(circle at 22% 32%, rgba(255,255,255,.7) 0, transparent 1px),
    radial-gradient(circle at 71% 64%, rgba(255,255,255,.6) 0, transparent 1px);
  background-size:3px 3px, 5px 5px;
}

#py-loader .pyl-mark{
  position:relative;
  width:120px; height:120px;
}
#py-loader .pyl-aura{
  position:absolute; inset:-32%; border-radius:50%;
  background:radial-gradient(circle, rgba(246,190,61,.4) 0%, transparent 65%);
  filter:blur(18px);
  animation:pylAura 2.4s ease-in-out infinite;
}
@keyframes pylAura{
  0%, 100%{ transform:scale(.95); opacity:.55 }
  50%{ transform:scale(1.08); opacity:.95 }
}
#py-loader .pyl-ring{
  position:absolute; inset:-10%;
  border-radius:50%;
  border:1px solid transparent;
  border-top-color:rgba(246,190,61,.85);
  border-right-color:rgba(246,190,61,.35);
  animation:pylSpin 1.6s linear infinite;
}
#py-loader .pyl-ring-2{
  inset:-22%;
  border-style:dashed;
  border-top-color:transparent;
  border-bottom-color:rgba(246,190,61,.45);
  animation:pylSpin 3.4s linear infinite reverse;
}
@keyframes pylSpin{ to{ transform:rotate(360deg) } }

#py-loader .pyl-disc{
  position:relative; width:100%; height:100%;
  border-radius:50%;
  background:radial-gradient(circle at 30% 25%, #fff 0%, #f3f6fb 60%, #e6edf6 100%);
  display:grid; place-items:center;
  box-shadow:
    0 24px 60px -20px rgba(0,0,0,.6),
    0 0 0 1px rgba(246,190,61,.55) inset,
    inset 0 -2px 0 rgba(0,0,0,.06);
  z-index:2;
  animation:pylFloat 3.6s ease-in-out infinite;
}
@keyframes pylFloat{
  0%, 100%{ transform:translateY(0) }
  50%{ transform:translateY(-4px) }
}
#py-loader .pyl-disc img{
  width:78%; height:78%;
  object-fit:contain;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.18));
}
#py-loader .pyl-sweep{
  position:absolute; inset:0;
  border-radius:50%;
  background:linear-gradient(115deg, transparent 32%, rgba(255,255,255,.6) 48%, transparent 64%);
  mix-blend-mode:overlay;
  animation:pylSweep 3.2s ease-in-out infinite;
  z-index:3;
  pointer-events:none;
}
@keyframes pylSweep{
  0%{ transform:translateX(-120%) rotate(0deg); opacity:0 }
  35%{ opacity:.7 }
  70%{ transform:translateX(120%) rotate(0deg); opacity:0 }
  100%{ transform:translateX(120%) rotate(0deg); opacity:0 }
}

#py-loader .pyl-wordmark{
  position:relative;
  display:flex; align-items:center; gap:12px;
  color:#fff;
  font-family:'Anton', Impact, sans-serif;
  font-size:18px;
  letter-spacing:.32em;
  text-transform:uppercase;
}
#py-loader .pyl-wordmark .pyl-bar{
  width:24px; height:1px;
  background:linear-gradient(90deg, transparent, rgba(246,190,61,.85), transparent);
}
#py-loader .pyl-wordmark b{
  font-weight:400;
  background:linear-gradient(180deg, #FFE176, #FFC93C 60%, #C8951F);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; color:transparent;
}

#py-loader .pyl-sub{
  font-family:'JetBrains Mono', ui-monospace, monospace;
  font-size:10px; letter-spacing:.32em; text-transform:uppercase;
  color:rgba(255,255,255,.45);
  display:flex; align-items:center; gap:10px;
}
#py-loader .pyl-sub .pyl-dot{
  width:5px; height:5px; border-radius:50%; background:rgba(246,190,61,.85);
  animation:pylPulse 1.2s ease-in-out infinite;
}
@keyframes pylPulse{
  0%, 100%{ opacity:.3; transform:scale(.85) }
  50%{ opacity:1; transform:scale(1.1) }
}

/* Progress bar — fluido, decorativo */
#py-loader .pyl-bar-track{
  position:relative;
  width:min(220px, 60vw);
  height:1px;
  background:rgba(255,255,255,.08);
  overflow:hidden;
  border-radius:1px;
}
#py-loader .pyl-bar-fill{
  position:absolute; left:-40%; top:0; bottom:0;
  width:40%;
  background:linear-gradient(90deg, transparent, var(--gold, #FFC93C), transparent);
  animation:pylBar 1.5s cubic-bezier(.6,0,.4,1) infinite;
}
@keyframes pylBar{
  0%{ left:-40% }
  100%{ left:100% }
}

@media (max-width:520px){
  #py-loader .pyl-mark{ width:96px; height:96px }
  #py-loader .pyl-wordmark{ font-size:15px; letter-spacing:.28em }
}
@media (prefers-reduced-motion:reduce){
  #py-loader .pyl-aura, #py-loader .pyl-ring, #py-loader .pyl-ring-2,
  #py-loader .pyl-disc, #py-loader .pyl-sweep, #py-loader .pyl-bar-fill,
  #py-loader .pyl-sub .pyl-dot{ animation:none !important }
}

/* Lock scroll while loader visible */
html.is-loading, html.is-loading body{ overflow:hidden }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<body>
<div id="py-loader" aria-hidden="true">
  <div class="pyl-mark">
    <span class="pyl-aura"></span>

    <span class="pyl-disc">

    </span>
    <span class="pyl-sweep"></span>
  </div>
  <div class="pyl-wordmark">
    <span class="pyl-bar"></span>
    <b>Pielle Young</b>
    <span class="pyl-bar"></span>
  </div>
  <div class="pyl-bar-track"><span class="pyl-bar-fill"></span></div>
  <div class="pyl-sub">
    <span class="pyl-dot"></span>
    <span>Settore Giovanile · Livorno</span>
  </div>
</div>
<script>
  // Hide loader once React paints, but never sooner than 700ms (avoid flash)
  (function(){
    document.documentElement.classList.add('is-loading');
    var start = performance.now();
    var MIN_MS = 700;
    function hide(){
      var loader = document.getElementById('py-loader');
      if (!loader) return;
      var elapsed = performance.now() - start;
      var wait = Math.max(0, MIN_MS - elapsed);
      setTimeout(function(){
        loader.classList.add('is-hidden');
        document.documentElement.classList.remove('is-loading');
        setTimeout(function(){ loader && loader.parentNode && loader.parentNode.removeChild(loader); }, 700);
      }, wait);
    }
    // Watch for #root being populated (React first render)
    var root = document.getElementById('root');
    if (root){
      var obs = new MutationObserver(function(){
        if (root.childElementCount > 0){ obs.disconnect(); hide(); }
      });
      obs.observe(root, { childList:true });
    }
    // Hard fallback
    window.addEventListener('load', function(){ setTimeout(hide, 1200); });
    setTimeout(hide, 5000);
  })();
</script>
<div id="root"></div>
